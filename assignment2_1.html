<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notes App</title>

<style>
body{
    background-color: white;
    padding: 32px;
    display: flex;
    justify-content: center;
}

.container{
    width: 700px;
    border: 4px solid black;
    padding: 10px;
}

p{
    font-size: 14px;
}

button{
    padding: 4px;
    background-color: #4b6cb7;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    margin-right: 10px;
    width: 100px;
}

button:hover {
    background-color: #182848;
}

.row{
    display: flex;
    margin-bottom: 20px;
}

input{
    padding: 6px;
    border: 2px solid black;
    border-radius: 5px;
    font-size: 1rem;
    width: 100%;
    margin-right: 10px;
}

.container1{
    height: 400px;
    overflow-y: auto;
}

table{
    width: 100%;
    border-collapse: collapse;
}

th,td{
    padding: 8px 12px;
    border: 1px solid black;
}

thead th{
    position: sticky;
    top: 0;
    background: white;
}
</style>
</head>

<body>
<div class="container">

<p>
📝 Notes: <span id="totalnotes">0</span> |
Total Characters: <span id="totalcharacters">0</span>
</p>

<div class="row">
<input type="text" id="notes" placeholder="Write something..." />
<button type="button" id="addnote">Add Note</button>
</div>

<hr>

<div class="container1">
<table id="datatable">
<thead>
<tr>
<th style="width:10%">Serial</th>
<th style="width:60%">Note</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

const addBtn = document.getElementById("addnote");
const input = document.getElementById("notes");
const totalNotesCount = document.getElementById("totalnotes");
const totalCharsCount = document.getElementById("totalcharacters");
const tableBody = document.querySelector("#datatable tbody");





let notes=[];

loadNotes();

let editingIndex=null;


// localStorage.setItem("myCat", "Tom");
// localStorage.setItem("lizy", "busy");
// localStorage.setItem(input.value,1);
// localStorage.setItem("username",input.value);
// let name=localStorage.getItem("username");
// console.log(name);

//localStorage.removeItem("myCat");
//localStorage.clear();



addBtn.addEventListener("click", function(){

    //validate input
   const texts= input.value.trim();
   
   // for empty input
   if(!texts){
    alert("note cannot be empty");
    return;
   }

   //for too long text
   if(texts.length > 200){
    alert("note too long");
    return;
   }

   //for duplicate input
   const duplicate= notes.some(note => note.text===texts);

   if(duplicate){
    alert("note already exists!");
    return;
   }



    //update mode

    if(editingIndex!==null){
        notes[editingIndex].text=input.value;
        editingIndex=null;
        saveNotes();
        renderNotes();
        input.value="";
        addBtn.textContent="Add Note";
        return;
    }




//add note(input) to array
 notes.unshift({text: input.value});  //unshift---> add to beginning of array

 //console.log(notes);

 saveNotes();
 renderNotes();


input.value="";
})  

    //localStorage.setItem(count, input.value);
    // let name=localStorage.getItem(count);
    // console.log(name);

    // localStorage.setItem("username",input.value);
    // let name=localStorage.getItem("username");
    // console.log(name);

   function saveNotes() {

   localStorage.setItem("Notes" , JSON.stringify(notes))

   }




   function loadNotes(){
   const stored= localStorage.getItem("Notes");

   if(stored){
    notes= JSON.parse(stored);  //Convert JSON string → JavaScript array
   }

   renderNotes();

   }




   function renderNotes(){
    console.log("renderNotes running");
   tableBody.innerHTML="";

   notes.forEach((note,index) =>{
   console.log(note,index);
   createRow(note,index);
   //tableBody.appendChild(row);

   })

   updateCount();
   }



   function createRow(note,index){
   
    let tableRow=document.createElement("tr");

    let serialNo= document.createElement("td");
    serialNo.textContent=index + 1;

    let notecell=document.createElement("td");
    notecell.textContent=note.text;    //text is the property of object
    notecell.className="note-text";


    let actions=document.createElement("td");

    let editBtn=document.createElement("button");
    editBtn.textContent="Edit";

    let deleteBtn=document.createElement("button");
    deleteBtn.textContent="Delete";

    actions.append(editBtn,deleteBtn);

    tableRow.append(serialNo,notecell,actions);

    tableBody.appendChild(tableRow);


    //edit button
    editBtn.addEventListener("click",function(){

        editingIndex=index;
        input.value=note.text;
        addBtn.textContent="Update Note";
        input.focus();
    })


    //delete button
    deleteBtn.addEventListener("click",function(){

        notes.splice(index,1);
        saveNotes();
        renderNotes();

    })


   }


   function updateCount(){
   //total note count
   totalNotesCount.textContent=notes.length;

   //total chars count
   let total=0;

   notes.forEach(note =>{
   total += note.text.length;

   })

   totalCharsCount.textContent=total;

   }




</script>

</body>
</html>
