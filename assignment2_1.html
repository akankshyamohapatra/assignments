<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notes App</title>

<style>
body{
    background-color: white;
    padding: 32px;
    display: flex;
    justify-content: center;
}

.container{
    width: 700px;
    border: 4px solid black;
    padding: 10px;
}

p{
    font-size: 14px;
}

button{
    padding: 4px;
    background-color: #4b6cb7;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    margin-right: 10px;
    width: 100px;
}

button:hover {
    background-color: #182848;
}

.row{
    display: flex;
    margin-bottom: 20px;
}

input{
    padding: 6px;
    border: 2px solid black;
    border-radius: 5px;
    font-size: 1rem;
    width: 100%;
    margin-right: 10px;
}

.container1{
    height: 400px;
    overflow-y: auto;
}

table{
    width: 100%;
    border-collapse: collapse;
}

th,td{
    padding: 8px 12px;
    border: 1px solid black;
}

thead th{
    position: sticky;
    top: 0;
    background: white;
}
</style>
</head>

<body>
<div class="container">

<p>
📝 Notes: <span id="totalnotes">0</span> |
Total Characters: <span id="totalcharacters">0</span>
</p>

<div class="row">
<input type="text" id="notes" placeholder="Write something..." />
<button type="button" id="addnote">Add Note</button>
</div>

<hr>

<div class="container1">
<table id="datatable">
<thead>
<tr>
<th style="width:10%">Serial</th>
<th style="width:60%">Note</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

const addBtn = document.getElementById("addnote");
const input = document.getElementById("notes");
const totalNotes = document.getElementById("totalnotes");
const totalChars = document.getElementById("totalcharacters");
const tableBody = document.querySelector("#datatable tbody");

loadtable();

let editingRow = null;

// localStorage.setItem("myCat", "Tom");
// localStorage.setItem("lizy", "busy");
// localStorage.setItem(input.value,1);
// localStorage.setItem("username",input.value);
// let name=localStorage.getItem("username");
// console.log(name);

//localStorage.removeItem("myCat");
//localStorage.clear();


//let count=0;
addBtn.addEventListener("click", function(){

    if(input.value.trim() === "") return;

    //count++;

    // UPDATE MODE
    if(editingRow !== null){
        

        editingRow.querySelector(".note-text").textContent = input.value;
        editingRow = null;
        addBtn.textContent = "Add Note";
        input.value = "";
        updateTotalChars();
        savetable();
        return;
    }

    // CREATE NEW ROW
    const row = document.createElement("tr");

    const tdSerial = document.createElement("td");

    const tdNote = document.createElement("td");
    tdNote.textContent = input.value;
    tdNote.className = "note-text";

    //localStorage.setItem(count, input.value);
    // let name=localStorage.getItem(count);
    // console.log(name);

    // localStorage.setItem("username",input.value);
    // let name=localStorage.getItem("username");
    // console.log(name);

    const tdActions = document.createElement("td");

    const editBtn = document.createElement("button");
    editBtn.textContent = "Edit";

    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete";

    tdActions.append(editBtn, delBtn);
    row.append(tdSerial, tdNote, tdActions);

    

    // 🔥 IMPORTANT: New note goes to TOP (Descending order)
    tableBody.prepend(row);


    // DELETE
    delBtn.addEventListener("click", function(){
        row.remove();
        updateTotalNotes();
        updateTotalChars();
        savetable();
    });

    // EDIT
    editBtn.addEventListener("click", function(){
        input.value = tdNote.textContent;
        editingRow = row;
        addBtn.textContent = "Update Note";
       
    });

    input.value = "";

    updateTotalNotes();
    updateTotalChars();
    savetable();
});

function updateTotalNotes(){
    const rows = tableBody.querySelectorAll("tr");
    rows.forEach((row, index)=>{     //here row is row(tr), not variable
        row.children[0].textContent = index + 1; //1st row --->index=0, 2nd row --->index=1, 3rd row ---->index=2
    });
    totalNotes.textContent = rows.length;
}

function updateTotalChars(){
    let total = 0;
    document.querySelectorAll(".note-text").forEach(item=>{
        total += item.textContent.length;
    });
    totalChars.textContent = total;
}





function savetable(){
const rows= Array.from(tableBody.children);

const data= rows.map(row =>{
return {
    count: row.children[0].textContent,
    note: row.children[1].textContent,
    button: row.children[2].textContent
};

});

localStorage.setItem("notes",JSON.stringify(data));

}




function loadtable(){
    const stored= localStorage.getItem("notes");

    if(!stored){
        return;
    }

    const datas = JSON.parse(stored);

    datas.forEach(item =>{
    createrow(item.note);

    });
}




function createrow(text){

    let rown= document.createElement("tr");

    let td1=document.createElement("td");
    //td1.textContent=tableBody.children.length + 1;

    let td2=document.createElement("td");
    td2.textContent=text;
    td2.className="note-text";

    let td3=document.createElement("td");

    let editBtn=document.createElement("button");
    editBtn.textContent="Edit";

    let del= document.createElement("button");
    del.textContent="Delete";


    //delete
    del.addEventListener("click", function(){

        rown.remove();
        updateTotalNotes();
        updateTotalChars();
        savetable();
       
    })

    //edit
    editBtn.addEventListener("click", function(){
        input.value = td2.textContent;
        editingRow = rown;
        addBtn.textContent = "Update Note";
        
    });

    input.value = "";




    
    td3.append(editBtn,del);
    rown.append(td1,td2,td3);
    tableBody.appendChild(rown);


    updateTotalNotes();
    updateTotalChars();



}

</script>

</body>
</html>
