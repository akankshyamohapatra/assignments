<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checklist Manager</title>

    <style>
        body {
            background-color: white;
            padding: 32px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 700px;
            border: 4px solid black;
            padding: 10px;
        }

        p {
            font-size: 14px;
        }

        button {
            padding: 4px;
            background-color: #4b6cb7;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-right: 10px;
            width: 100px;
        }

        button:hover {
            background-color: #182848;
        }

        .row {
            display: flex;
            margin-bottom: 20px;
            justify-content: space-around;
        }

        input {
            padding: 6px;
            border: 2px solid black;
            border-radius: 5px;
            font-size: 1rem;
            width: 30%;
            margin-right: 10px;
        }

        .container1 {
            height: 300px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 8px 12px;
            border: 1px solid black;
        }

        thead th {
            position: sticky;
            top: 0;
            background: white;
        }

        td:nth-child(4) {
            text-align: right;
        }
    </style>

</head>

<body>

    <div class="container">

        <p>
            Item: <input type="text" id="items" placeholder="write items..." />

            Price: <input type="number" id="price" />

            <button type="button" id="additem">Add Item</button>

        </p>

        <hr>

        <div class="container1">
            <table id="datatable">
                <thead>
                    <tr>
                        <th style="width: 10%;">serialNo</th>
                        <th style="width: 10%;">Checkbox</th>
                        <th style="width: 40%;">Items</th>
                        <th style="width: 20%;">Price</th>
                        <th>Actions</th>

                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <hr>

        <div class="row">

            <p> Completed: <span id="Completed">0</span></p>

            <p> Price: <span id="Completedprice">0</span></p>


        </div>

    </div>



    <script>

        const addBtn = document.getElementById("additem");
        const inputItems = document.getElementById("items");
        const inputPrice = document.getElementById("price");
        const tableBody = document.querySelector("#datatable tbody");
        const completedItems = document.getElementById("Completed");
        const completedPrice = document.getElementById("Completedprice");




        let items = [];

        loadItems();

        let editingIndex = null;

        addBtn.addEventListener("click", function () {

            //validate inputs
            const newItem = inputItems.value.trim();

            const newPrice = Number(inputPrice.value.trim());   //inputPrice.value ----> a string,   Number(inputPrice.value) ---->convert string to number

            if (!validateInput(newItem)) {
                return;
            }

            if (!(newPrice) || newPrice <= 0) {
                alert("please enter valid price");
                return;
            }


            //update mode
            if (editingIndex !== null) {

                updateRow(editingIndex, newItem, newPrice);

                return;
            } else {
                addRow(newItem, newPrice);
            }

            

        })


















        function saveItems(items) {

            localStorage.setItem("Items", JSON.stringify(items));
        }



        function loadItems() {
            const stored = localStorage.getItem("Items");

            if (stored) {
                items = JSON.parse(stored);    //Convert JSON string → JavaScript array
            }

            renderItems(items);
        }



        function renderItems(items) {
            tableBody.innerHTML = "";

            items.forEach((product, index) => {
                createRow(product, index);
            })

            updateCount(items);

        }




        function createRow(product, index) {

            let tableRow = document.createElement("tr");

            let serialNo = document.createElement("td");
            serialNo.textContent = index + 1;

            let checkboxCell = document.createElement("td");

            let checkBox = document.createElement("input");
            checkBox.type = "checkbox";
            checkBox.checked = product.checked;

            let itemCell = document.createElement("td");
            itemCell.textContent = product.item;

            let priceCell = document.createElement("td");
            priceCell.textContent = product.price;

            let actions = document.createElement("td");

            let editBtn = document.createElement("button");
            editBtn.textContent = "Edit";

            let deleteBtn = document.createElement("button");
            deleteBtn.textContent = "Delete";

            actions.append(editBtn, deleteBtn);

            checkboxCell.appendChild(checkBox);

            tableRow.append(serialNo, checkboxCell, itemCell, priceCell, actions);

            tableBody.appendChild(tableRow);


            //edit button
            editBtn.addEventListener("click", function () {

                editingIndex = index;

                inputItems.value = product.item;

                inputPrice.value = product.price;

                addBtn.textContent = "Update Item";

                inputItems.focus();


            })


            //delete button
            deleteBtn.addEventListener("click", function () {

                items.splice(index, 1);

                saveItems(items);

                renderItems(items);

            })


            //checkbox button
            checkBox.addEventListener("change", function () {

                product.checked = checkBox.checked;

                saveItems(items);

                updateCount(items);
            })

        }



        function updateCount(items) {
            //completed count
            let completed = 0;

            items.forEach(product => {
                if (product.checked) {
                    completed++;
                }
            })

            completedItems.textContent = completed + "/" + items.length;


            //completed price count
            let totalPrice = 0;
            let price = 0;

            items.forEach(product => {
                totalPrice += product.price;

                if (product.checked) {
                    price += product.price;
                }
            })

            completedPrice.textContent = price + "/" + totalPrice;

        }


        function validateInput(newText) {
            //for empty input
            if (!newText) {
                alert("item cannot be empty");
                return false;
            }

            //for duplicate input
            const duplicate = items.some((product, index) => product.item.toLowerCase() == newText.toLowerCase() && index !== editingIndex);

            if (duplicate) {
                alert("item already exists!");
                return false;
            }

            return true;
        }


        function updateRow(index, newItem, newPrice) {
            items[index].item = newItem;
            items[index].price = newPrice;

            editingIndex = null;
            saveItems(items);
            renderItems(items);

            inputItems.value = "";
            inputPrice.value = "";

            addBtn.textContent = "Add Item";

        }


        function addRow(newItem, newPrice) {

            items.unshift({       //unshift---> add to beginning of array
                item: newItem,
                price: newPrice,
                checked: false
            })

            saveItems(items);
            renderItems(items);

            inputItems.value = "";
            inputPrice.value = "";

        }






    </script>



</body>


</html>
