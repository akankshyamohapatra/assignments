<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,intial scale=1.0"/>
<title>notes app</title>

<style>
body{
    background-color: white;
    padding: 32px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    background-color: white;
    padding: 4px;
    width: 700px;
    border: 4px solid black;
    
       
}

p{
color: black;
font-size: 14px;
}

button{
    padding: 2px;
    background-color: #4b6cb7;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.3s ease;
    margin-bottom: 30px;
    margin-right: 10px;
    width: 100px;
}

button:hover {
      background-color: #182848;
    }

.row{
    display: flex;
    flex-direction: row;
    margin-right: 40px;
    margin-bottom: 20px;
}

hr{
    background-color: black;
    height: 2px;
    margin-bottom: 30px;
}

input,
    textarea {
      padding: 2px;
      border: 2px solid black;
      border-radius: 5px;
      font-size: 1rem;
      box-sizing: border-box;
      width: 100%;
      margin-right: 50px;
    }

    .container1{
        background-color: white;
    padding: 4px;
    width: 680px;
    border: 4px solid white;
    height: 500px;
    /* vertical scroll */
    overflow-y: auto;    
    }

    

</style>
</head>

<body>
<div class="container">

<p>📝 Notes: <span id="totalnotes">0</span> |   Total Characters: <span id="totalcharacters">0</span></p>


<div class="row">
<input type="text"  id="notes" name="notes" placeholder="Write something..." />
<button type="button" id="addnote">Add Note</button>
</div>


<hr>


<div id="records" class="container1">

<!-- <div class="row">

<p> </p>


<button type="button" id="deletebtn">[❌ Delete]</button>


</div> -->
</div>

</div>

<script>

let addnotebtnselector=document.getElementById("addnote");
let notelistselector=document.getElementById("records");
let totalnotesselector=document.getElementById("totalnotes")
let totalcharsselector=document.getElementById("totalcharacters")
let inputs=document.querySelector("input");



let count=0;
let editingrow=null;


addnotebtnselector.addEventListener("click",function(){

    //update same row
    if(editingrow!==null){
    let para=editingrow.querySelector(".card");
    para.textContent=inputs.value;

    editingrow=null;
    addnotebtnselector.textContent="Add Note";
    inputs.value="";

    updatetotalchars();
    return; //stops the function
}


count++;



let noterow=document.createElement("div");
noterow.className='row';


let para0=document.createElement("p");
//para0.textContent=count + ":";


let text=inputs.value    //read input
let paragraph=document.createElement("p");
paragraph.textContent= text;
paragraph.className="card";




let del=document.createElement("button");
del.textContent="Delete"



let edit=document.createElement("button");
edit.textContent="edit"




//delete button
del.addEventListener("click",function(){

    noterow.remove();
  
    updatetotalnotes();
    updatetotalchars();

})




//edit button
edit.addEventListener("click",function(){
let ccc=paragraph.textContent;
inputs.value=ccc;
addnotebtnselector.textContent="update note";

editingrow=noterow;

})





noterow.append(para0,paragraph,del,edit);
// notelistselector.appendChild(noterow);
notelistselector.prepend(noterow);


addnotebtnselector.textContent="Add Note";

updatetotalnotes();
updatetotalchars();

//update totalchars while typing
// inputs.addEventListener("input",function(){

// updatetotalchars();

// })


inputs.value="";    //clear input


//reverse the rows
for(let i=notelistselector.children.length - 1; i>=0; i--){

    notelistselector.appendChild(notelistselector.children[i]);

}





function updatetotalnotes(){

    let noterows=notelistselector.children;

    for(let i=0; i<noterows.length; i++){
        noterows[i].children[0].textContent=(i+1) + ":" ;
    }

    count= noterows.length;
    totalnotesselector.textContent=count;
}


function updatetotalchars(){
let totalchars=0;

const chars=document.querySelectorAll(".card");

chars.forEach(paragraph =>{
totalchars+=paragraph.textContent.length; //Always read ".value.length" at the moment you calculate the total
})
totalcharsselector.textContent= totalchars;


}

})



</script>

</body>

</html>
