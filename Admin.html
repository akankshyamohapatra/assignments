<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>


    <style>
        body {
            background-color: white;
            padding: 32px;
            display: flex;
            justify-content: center;
        }

        .container {
            border: 4px solid black;
            padding: 20px;

            width: 60%;
        }

        p {
            font-size: 14px;
        }

        button {
            padding: 4px;
            background-color: #4b6cb7;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100px;
        }

        button:hover {
            background-color: #182848;
        }

        input {
            padding: 6px;
            border: 2px solid black;
            border-radius: 5px;
            font-size: 1rem;
            width: 90%;
            /* margin-bottom: 10px; */
        }

        h2 {
            color: black;
            text-align: center;
        }

        .container1 {
            border: 2px solid black;
            display: flex;
            justify-content: center;
            margin-right: 10px;
            width: 30%;
        }

        .column {
            display: flex;
            flex-direction: column;
        }

        .row {
            display: flex;
            flex-direction: row;
        }

        .container2 {
            border: 2px solid black;
            width: 70%;
            padding: 20px;

        }

        hr {
            background-color: red;
            height: 3px;
            width: 100%;
            margin-bottom: 20px;
        }

        .error-message {
            color: red;
            font-size: 0.9em;
            margin-top: 0px;
            margin-bottom: 10px;
            /* space below input */
            /* min-height: 0.1em; */
            /* keeps space even when empty */
        }

        .progress-container {
            width: 70%;
            background-color: #ddd;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 20px;
            background-color: #4b6cb7;
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="column">

            <h2 style="color: red; font-size: 30px;">Admin Dashboard</h2>


            <p class="error-message" id="messageError"></p>

            <p><b>Poll Question:</b></p>

            <div id="question"></div>

            <input type="text" id="questionInput" placeholder="Poll Question" style="height: 40px;">


            <div class="error-message" id="questionError" style="margin-bottom: 40px;"></div>

            <p><b>Options:</b></p>

            <div id="options"></div>

            <input type="text" class="option" placeholder="Option 1">

            <div class="error-message" id="optionError1"></div>

            <input type="text" class="option" placeholder="Option 2">

            <div class="error-message" id="optionError2"></div>

            <input type="text" class="option" placeholder="Option 3">

            <div class="error-message" id="optionError3"></div>

            <hr>

            <div class="container3">
                <div class="row">
                    <div class="container1">

                        <div class="column">

                            <h2>🎛 Controls</h2>

                            <button type="button" id="createPoll">Create Poll</button>

                            <button type="button" id="startPoll">Start Poll</button>

                            <button type="button" id="stopPoll">Stop Poll</button>

                            <button type="button" id="showResult">Show Results</button>

                            <button type="button" id="hideResult">Hide Results</button>

                            <button type="button" id="copyLink">Copy Link</button>

                            <button type="button" id="exportCsv">Export CSV</button>
                        </div>


                    </div>



                    <div class="container2">

                        <h2 style="text-align: initial;"> 📈 Live Results </h2>

                        <div id="results"></div>

                        <p>Total Votes: <span id="totalVotes">0</span></p>


                    </div>

                </div>

            </div>
        </div>

    </div>

    <script>

        const createPollBtn = document.getElementById("createPoll");
        const startPollBtn = document.getElementById("startPoll");
        const stopPollBtn = document.getElementById("stopPoll");
        const showResultsBtn = document.getElementById("showResult");
        const hideResultBtn = document.getElementById("hideResult");
        const copyLinkBtn = document.getElementById("copyLink");
        const exportCsvBtn = document.getElementById("exportCsv");
        const resultsSection = document.getElementById("results");
        const pollQuestion = document.getElementById("questionInput");
        const optionInputs = document.querySelectorAll(".option");
        const totalVotes = document.getElementById("totalVotes");
        const questionSelector = document.getElementById("question");
        const optionSelector = document.getElementById("options");
        const questionErrorSelector = document.getElementById("questionError");
        const firstOptionErrorSelector = document.getElementById("optionError1");
        const secOptionErrorSelector = document.getElementById("optionError2");
        const thirdOptionErrorSelector = document.getElementById("optionError3");
        const messageErrorSelector = document.getElementById("messageError");







        //localStorage.clear();
        loadData();

        createPollBtn.addEventListener("click", function () {

            messageErrorSelector.textContent = "";

            const existingPoll = getPoll();

            let isValid = true;

            if (existingPoll) {

                for (let i = 0; i < existingPoll.options.length; i++) {

                    if (optionInputs[i].value.trim() !== existingPoll.options[i].text) {

                        isValid = false;
                        break;    //stop for loop
                    }
                }
            }



            if (existingPoll && pollQuestion.value.trim() === existingPoll.question && isValid) {

                messageErrorSelector.textContent = "poll already exists!";

                // alert("poll already exists!");

                showPreview();



                return;

            } else {

                const poll = {
                    question: pollQuestion.value,
                    options: [],
                    isActive: false,
                    showResults: false
                }

                // optionInputs.forEach(input => {
                //     if (input.value.trim() !== "") {
                //         poll.options.push({ text: input.value, votes: 0 });
                //     }
                // })

                let isVal = true;

                if (!poll.question.trim()) {
                    questionErrorSelector.textContent = "Enter Question";

                    pollQuestion.style.border = "2px solid red";

                    isVal = false;
                    //alert("Enter Question");
                    // return;
                } else {
                    questionErrorSelector.textContent = "";
                    pollQuestion.style.border = "2px solid black";
                }


                firstOptionErrorSelector.textContent = "";
                secOptionErrorSelector.textContent = "";
                thirdOptionErrorSelector.textContent = "";

                for (let i = 0; i < optionInputs.length; i++) {

                    const input = optionInputs[i];

                    if (input.value.trim() !== "") {
                        input.style.border = "2px solid black";
                    }
                }


                for (let i = 0; i < optionInputs.length; i++) {

                    const input = optionInputs[i];

                    if (i == 0 && input.value.trim() === "") {
                        firstOptionErrorSelector.textContent = "Add Option 1";

                        optionInputs[i].style.border = "2px solid red";

                        //alert("Add Options");

                        isVal = false;

                        //return;  //stop the function 
                    }



                    if (i == 1 && input.value.trim() === "") {

                        secOptionErrorSelector.textContent = "Add Option 2";

                        isVal = false;

                        optionInputs[i].style.border = "2px solid red";

                        //return;
                    }

                    if (i == 2 && input.value.trim() === "") {

                        thirdOptionErrorSelector.textContent = "Add Option 3";

                        isVal = false;

                        optionInputs[i].style.border = "2px solid red";

                        //return;
                    }


                    if (input.value.trim() !== "") {

                        poll.options.push({ text: input.value.trim(), votes: 0 })
                    }



                }



                if (!isVal) {

                    return;
                }





                savePoll(poll);

                showPreview();



                //loadData();

                alert("poll created");

            }



        })



        startPollBtn.addEventListener("click", function () {

            const poll = getPoll();

            if (!poll) {
                alert("create poll first");
                return;
            }

            if (poll.isActive) {
                alert("poll already started");
                return;
            }



            poll.isActive = true;

            savePoll(poll);

            //loadData();

            alert("poll started");

        })




        stopPollBtn.addEventListener("click", function () {

            const poll = getPoll();

            if (!poll) {
                alert("create poll first");
                return;
            }

            if (!poll.isActive) {
                alert("poll already stopped");
                return;
            }

            poll.isActive = false;

            savePoll(poll);

            //loadData();



            alert("poll stopped");

        })

        showResultsBtn.addEventListener("click", function () {

            const poll = getPoll();

            if (!poll) {
                alert("create poll first");
                return;
            }




            poll.showResults = true;

            savePoll(poll);

            resultsSection.style.display = "block" //show again



            renderResults(poll);

        })



        hideResultBtn.addEventListener("click", function () {

            const poll = getPoll();

            if (!poll) {
                alert("create poll first");
                return;
            }

            poll.showResults = false;

            savePoll(poll);

            //resultsSection.innerHTML="results hidden";

            resultsSection.style.display = "none";

        })




        //functions

        function savePoll(poll) {
            localStorage.setItem("pollData", JSON.stringify(poll));
        }


        function getPoll() {
            return JSON.parse(localStorage.getItem("pollData"));
        }


        function renderResults(poll) {

            // const poll=getPoll();

            if (!poll) {
                alert("create poll first");
                return;
            }

            let total = 0;

            poll.options.forEach(option => {
                total += Number(option.votes);

            })

            totalVotes.textContent = total;


            resultsSection.innerHTML = "";

            poll.options.forEach(option => {

                const percent = (Number(option.votes) / total) * 100;

                resultsSection.innerHTML += `<div class="row"> 
                    
                <div style="margin-right:10px;" >    ${option.text}   </div>
                    
                    <div class="progress-container" >
                <div class="progress-bar" style="width: ${percent}%"></div>
            </div>

              <div> ${percent}%    (${option.votes}) </div>
                
            
                    
                    
                    
                    </div>`

            })




        }


        function loadData() {
            const data = getPoll();

            if (data) {

                //restore question
                pollQuestion.value = data.question;

                //restore options
                data.options.forEach((option, index) => {
                    optionInputs[index].value = option.text;

                })



                if (data.showResults) {
                    renderResults(data);
                    resultsSection.style.display = "block";
                } else {
                    resultsSection.style.display = "none";
                }

            }


        }


        function showPreview() {

            pollQuestion.style.display = "none";

            questionSelector.textContent = pollQuestion.value;

            optionInputs.forEach(input => {
                input.style.display = "none";

            })

            optionSelector.innerHTML = "";

            optionInputs.forEach(input => {

                if (input.value.trim() !== "") {

                    optionSelector.innerHTML += `<p> ${input.value} </p>`;

                }

            })






        }


    </script>


</body>


</html>
