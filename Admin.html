<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>


    <style>
        body {
            background-color: white;
            padding: 32px;
            display: flex;
            justify-content: center;
        }

        .container {
            border: 4px solid black;
            padding: 20px;

            width: 60%;
        }

        p {
            font-size: 14px;
        }

        button {
            padding: 4px;
            background-color: #4b6cb7;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100px;
        }

        button:hover {
            background-color: #182848;
        }

        input {
            padding: 6px;
            border: 2px solid black;
            border-radius: 5px;
            font-size: 1rem;
            width: 90%;
            margin-bottom: 10px;
        }

        h2 {
            color: black;
            text-align: center;
        }

        .container1 {
            border: 2px solid black;
            display: flex;
            justify-content: center;
            margin-right: 10px;
            width: 30%;
        }

        .column {
            display: flex;
            flex-direction: column;
        }

        .row {
            display: flex;
            flex-direction: row;
        }

        .container2 {
            border: 2px solid black;
            width: 70%;
            padding: 20px;

        }

        hr {
            background-color: red;
            height: 3px;
            width: 100%;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="column">

            <h2 style="color: red; font-size: 30px;">Admin Dashboard</h2>


            <p><b>Poll Question:</b></p>

            <div id="question"></div>

            <input type="text" id="questionInput" placeholder="Poll Question"
                style="margin-bottom: 40px; height: 40px;">

            <p><b>Options:</b></p>

            <div id="options"></div>

            <input type="text" class="option" placeholder="Option 1">

            <input type="text" class="option" placeholder="Option 2">

            <input type="text" class="option" placeholder="Option 3" style="margin-bottom: 20px;">

            <hr>

            <div class="container3">
                <div class="row">
                    <div class="container1">

                        <div class="column">

                            <h2>🎛 Controls</h2>

                            <button type="button" id="createPoll">Create Poll</button>

                            <button type="button" id="startPoll">Start Poll</button>

                            <button type="button" id="stopPoll">Stop Poll</button>

                            <button type="button" id="showResult">Show Results</button>

                            <button type="button" id="hideResult">Hide Results</button>

                            <button type="button" id="copyLink">Copy Link</button>

                            <button type="button" id="exportCsv">Export CSV</button>
                        </div>


                    </div>



                    <div class="container2">

                        <h2 style="text-align: initial;"> 📈 Live Results </h2>

                        <div id="results"></div>

                        <p>Total Votes: <span id="totalVotes">0</span></p>


                    </div>

                </div>

            </div>
        </div>

    </div>

    <script>

        const createPollBtn = document.getElementById("createPoll");
        const startPollBtn = document.getElementById("startPoll");
        const stopPollBtn = document.getElementById("stopPoll");
        const showResultsBtn = document.getElementById("showResult");
        const hideResultBtn = document.getElementById("hideResult");
        const copyLinkBtn = document.getElementById("copyLink");
        const exportCsvBtn = document.getElementById("exportCsv");
        const resultsSection = document.getElementById("results");
        const pollQuestion = document.getElementById("questionInput");
        const optionInputs = document.querySelectorAll(".option");
        const totalVotes=document.getElementById("totalVotes");
        const questionSelector=document.getElementById("question");
        const optionSelector=document.getElementById("options");

//localStorage.clear();
        loadData();

        createPollBtn.addEventListener("click", function () {


            const existingPoll = getPoll();

            let isValid = true;

            if (existingPoll) {

                for (let i = 0; i < existingPoll.options.length; i++) {

                    if (optionInputs[i].value !== existingPoll.options[i].text) {

                        isValid = false;
                        break;    //stop for loop
                    }
                }
            }



            if (existingPoll && pollQuestion.value === existingPoll.question && isValid) {

                alert("poll already exists!");

                pollQuestion.style.display="none";

               questionSelector.textContent= pollQuestion.value;

            optionInputs.forEach(input => {
            input.style.display="none";

            })

            optionSelector.innerHTML="";

            optionInputs.forEach(input => {

            optionSelector.innerHTML += `<p> ${input.value} </p>`;

            })


                
                return;

            } else {

                const poll = {
                    question: pollQuestion.value,
                    options: [],
                    isActive: false,
                    showResults: false
                }

                // optionInputs.forEach(input => {
                //     if (input.value.trim() !== "") {
                //         poll.options.push({ text: input.value, votes: 0 });
                //     }
                // })


                if (!poll.question.trim()) {
                    alert("Enter Question");
                    return;
                }



                for (const input of optionInputs) {
                    if (input.value.trim() === "") {
                        alert("Add Options");

                        return;  //stop the function 
                    }

                    poll.options.push({ text: input.value, votes: 0 });

                }


                savePoll(poll);

                pollQuestion.style.display="none";

               questionSelector.textContent= pollQuestion.value;

            optionInputs.forEach(input => {
            input.style.display="none";

            })

            optionSelector.innerHTML="";

            optionInputs.forEach(input => {

            optionSelector.innerHTML += `<p> ${input.value} </p>`;

            })

               

                //loadData();

                alert("poll created");

            }

        })



        startPollBtn.addEventListener("click", function () {

            const poll = getPoll();

            if(!poll){
                alert("create poll first");
                return;
            }

            if(poll.isActive){
                alert("poll already started");
                return;
            }

           

            poll.isActive = true;

            savePoll(poll);

            //loadData();

            alert("poll started");

        })




        stopPollBtn.addEventListener("click", function () {

            const poll = getPoll();

            if (!poll) {
                alert("create poll first");
                return;
            }

            if(!poll.isActive){
                alert("poll already stopped");
                return;
            }

            poll.isActive = false;

            savePoll(poll);

            //loadData();

            

            alert("poll stopped");

        })

        showResultsBtn.addEventListener("click", function () {

            const poll = getPoll();

            if (!poll) {
                alert("create poll first");
                return;
            }

            


            poll.showResults = true;

            savePoll(poll);

            resultsSection.style.display = "block" //show again

            

           renderResults(poll);

        })



        hideResultBtn.addEventListener("click", function () {

            const poll = getPoll();

            if (!poll) {
                alert("create poll first");
                return;
            }

            poll.showResults = false;

            savePoll(poll);

            //resultsSection.innerHTML="results hidden";

            resultsSection.style.display = "none";

        })




        //functions

        function savePoll(poll) {
            localStorage.setItem("pollData", JSON.stringify(poll));
        }


        function getPoll() {
            return JSON.parse(localStorage.getItem("pollData"));
        }


        function renderResults(poll) {

            // const poll=getPoll();

            if (!poll) {
                alert("create poll first");
                return;
            }

            resultsSection.innerHTML = "";

            poll.options.forEach(option => {

                resultsSection.innerHTML += `<p> ${option.text} : ${option.votes}</p>`

            })



            let total=0;

            poll.options.forEach(option => {
            total += Number(option.votes);

            })

            totalVotes.textContent= total;

        }


        function loadData() {
            const data = getPoll();

            if (data) {

                //restore question
                pollQuestion.value = data.question;

                //restore options
                data.options.forEach((option, index) => {
                    optionInputs[index].value = option.text;

                })

                

                if (data.showResults) {
                    renderResults(data);
                    resultsSection.style.display = "block";
                } else {
                    resultsSection.style.display = "none";
                }

            }


        }


    </script>


</body>


</html>
